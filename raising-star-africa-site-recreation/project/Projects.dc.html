</helmet>
<div style="font-family:var(--font-body);color:var(--text-body)">
  <dc-import name="SiteHeader" current="projects" hint-size="100%,140px"></dc-import>
  <section style="position:relative;padding:96px 0 76px;background-image:linear-gradient(120deg, rgba(23,120,133,.94), rgba(77,133,49,.86)), url(assets/photos/this-ability-5.jpg);background-size:cover;background-position:center">
    <div style="max-width:var(--container-max);margin:0 auto;padding:0 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px">
      <span style="font-family:var(--font-heading);font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--rsa-gold)">Our Work</span>
      <h1 style="margin:0;font-family:var(--font-display);font-weight:800;font-size:clamp(34px,4.5vw,54px);color:#fff">Projects</h1>
      <p style="margin:0;font-size:18px;line-height:1.6;color:rgba(255,255,255,.9);max-width:640px">In line with our mission, our projects help us reach out to the communities that need our resources the most.</p>
    </div>
  </section>
  <section style="max-width:var(--container-max);margin:0 auto;padding:80px 24px 40px">
    <div style="display:flex;justify-content:center;margin-bottom:40px">
      <x-import component-from-global-scope="RaisingStarAfricaDesignSystem_bbbbd8.SectionHeading" from="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/_ds_bundle.js" eyebrow="Current & Upcoming" title="Projects we are running now" hint-size="640px,auto"></x-import>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px">
      <sc-for list="{{ current }}" as="p" hint-placeholder-count="9">
        <x-import component-from-global-scope="RaisingStarAfricaDesignSystem_bbbbd8.ProgramCard" image="{{ p.img }}" badge="{{ p.badge }}" title="{{ p.title }}" description="{{ p.desc }}" link-label="View project" href="ProjectDetail.dc.html" hint-size="100%,400px"></x-import>
      </sc-for>
    </div>
  </section>
  <section style="background:var(--rsa-surface);padding:72px 0">
    <div style="max-width:var(--container-max);margin:0 auto;padding:0 24px">
      <div style="display:flex;justify-content:center;margin-bottom:36px">
        <x-import component-from-global-scope="RaisingStarAfricaDesignSystem_bbbbd8.SectionHeading" eyebrow="Our Track Record" title="Past projects" intro="Completed work that has already changed lives across Lagos and beyond." hint-size="640px,auto"></x-import>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px">
        <sc-for list="{{ past }}" as="p" hint-placeholder-count="6">
          <div style="background:#fff;border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:26px 24px;display:flex;flex-direction:column;gap:12px">
            <span style="display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;background:var(--rsa-green-100);color:var(--rsa-green-600)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
            <h3 style="margin:0;font-family:var(--font-display);font-weight:700;font-size:17px;line-height:1.3;color:var(--text-strong)">{{ p }}</h3>
          </div>
        </sc-for>
      </div>
    </div>
  </section>
  <dc-import name="SiteFooter" hint-size="100%,360px"></dc-import>
</div>
</x-dc>

</body>
</html>
