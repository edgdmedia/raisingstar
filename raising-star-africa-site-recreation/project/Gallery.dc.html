<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/tokens/fonts.css">
<link rel="stylesheet" href="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/tokens/colors.css">
<link rel="stylesheet" href="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/tokens/typography.css">
<link rel="stylesheet" href="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/tokens/spacing.css">
<link rel="stylesheet" href="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/tokens/base.css">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet">
<style>body{margin:0;background:#fff}a{color:var(--color-primary)}a:hover{color:var(--color-primary-active)}:root{--font-display:'Bricolage Grotesque',sans-serif}</style>
</helmet>
<div style="font-family:var(--font-body);color:var(--text-body)">
  <dc-import name="SiteHeader" current="gallery" hint-size="100%,140px"></dc-import>
  <section style="position:relative;padding:92px 0 72px;background-image:linear-gradient(120deg, rgba(23,120,133,.94), rgba(77,133,49,.86)), url(assets/gallery/g2.jpg);background-size:cover;background-position:center">
    <div style="max-width:var(--container-max);margin:0 auto;padding:0 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px">
      <span style="font-family:var(--font-heading);font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--rsa-gold)">Moments</span>
      <h1 style="margin:0;font-family:var(--font-display);font-weight:800;font-size:clamp(34px,4.5vw,54px);color:#fff">Gallery</h1>
      <p style="margin:0;font-size:18px;line-height:1.6;color:rgba(255,255,255,.9);max-width:600px">Scenes from our schools, events and communities — the children and moments at the heart of our work.</p>
    </div>
  </section>
  <section style="max-width:var(--container-max);margin:0 auto;padding:72px 24px">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
      <sc-for list="{{ tiles }}" as="t" hint-placeholder-count="14"><button onClick="{{ t.open }}" aria-label="View photo" style="{{ t.style }}" style-hover="transform:scale(1.03);box-shadow:var(--shadow-lg)"></button></sc-for>
    </div>
  </section>
  <sc-if value="{{ isOpen }}">
    <div onClick="{{ close }}" style="position:fixed;inset:0;z-index:200;background:rgba(19,26,25,.92);display:flex;align-items:center;justify-content:center;padding:40px">
      <button onClick="{{ close }}" style="position:absolute;top:24px;right:28px;width:46px;height:46px;border-radius:999px;border:none;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center" style-hover="background:rgba(255,255,255,.28)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      <button onClick="{{ prev }}" style="position:absolute;left:28px;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:999px;border:none;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center" style-hover="background:rgba(255,255,255,.28)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
      <img src="{{ currentSrc }}" alt="Gallery photo" style="max-width:min(1000px,90vw);max-height:82vh;object-fit:contain;border-radius:var(--radius-md);box-shadow:0 24px 60px rgba(0,0,0,.5)">
      <button onClick="{{ next }}" style="position:absolute;right:28px;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:999px;border:none;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center" style-hover="background:rgba(255,255,255,.28)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
    </div>
  </sc-if>
  <dc-import name="SiteFooter" hint-size="100%,360px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:800}}">
class Component extends DCLogic {
  state = { open: null };
  renderVals() {
    const srcs = ['assets/gallery/g1.jpg', 'assets/gallery/g2.jpg', 'assets/gallery/g3.jpg', 'assets/gallery/g4.jpg', 'assets/gallery/g5.jpg', 'assets/gallery/g6.jpg', 'assets/gallery/g7.jpg', 'assets/gallery/g8.jpg', 'assets/gallery/g9.jpeg', 'assets/gallery/g10.jpeg', 'assets/gallery/g11.jpeg', 'assets/gallery/g12.jpeg', 'assets/gallery/g13.jpeg', 'assets/gallery/g14.jpeg'];
    const tiles = srcs.map((src, idx) => ({
      open: () => this.setState({ open: idx }),
      style: {
        backgroundImage: `url(${src})`, backgroundSize: 'cover', backgroundPosition: 'center',
        width: '100%', aspectRatio: '1 / 1', borderRadius: 'var(--radius-md)', border: 'none', padding: 0,
        cursor: 'pointer', boxShadow: 'var(--shadow-sm)',
        transition: 'transform 300ms cubic-bezier(.2,.7,.3,1), box-shadow 300ms cubic-bezier(.2,.7,.3,1)',
      },
    }));
    const isOpen = this.state.open != null;
    return {
      tiles, isOpen,
      currentSrc: isOpen ? srcs[this.state.open] : '',
      close: () => this.setState({ open: null }),
      prev: (e) => { if (e) e.stopPropagation(); this.setState((s) => ({ open: (s.open - 1 + srcs.length) % srcs.length })); },
      next: (e) => { if (e) e.stopPropagation(); this.setState((s) => ({ open: (s.open + 1) % srcs.length })); },
    };
  }
}
</script>
</body>
</html>
