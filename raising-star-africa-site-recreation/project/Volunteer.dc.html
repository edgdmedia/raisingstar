<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/tokens/fonts.css">
<link rel="stylesheet" href="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/tokens/colors.css">
<link rel="stylesheet" href="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/tokens/typography.css">
<link rel="stylesheet" href="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/tokens/spacing.css">
<link rel="stylesheet" href="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/tokens/base.css">
<link rel="stylesheet" href="_ds/raising-star-africa-design-system-bbbbd8f1-ef80-4494-a454-4ac9b530c476/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet"><style>body{margin:0;background:#fff}a{color:var(--color-primary)}a:hover{color:var(--color-primary-active)}:root{--font-display:'Bricolage Grotesque',sans-serif}</style>
</helmet>
<div style="font-family:var(--font-body);color:var(--text-body)">
  <dc-import name="SiteHeader" current="join" hint-size="100%,140px"></dc-import>
  <section style="position:relative;padding:88px 0 68px;background-image:linear-gradient(120deg, rgba(23,120,133,.94), rgba(77,133,49,.86)), url(assets/photos/vocational-skill.jpg);background-size:cover;background-position:center">
    <div style="max-width:var(--container-max);margin:0 auto;padding:0 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px">
      <span style="font-family:var(--font-heading);font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--rsa-gold)">Join Us</span>
      <h1 style="margin:0;font-family:var(--font-display);font-weight:800;font-size:clamp(34px,4.5vw,54px);color:#fff">Volunteer</h1>
      <p style="margin:0;font-size:18px;line-height:1.6;color:rgba(255,255,255,.9);max-width:660px">Your time, skills and resources help us carry out our mission across Africa — and make a real impact on the wellbeing and education of children and differently-abled persons.</p>
    </div>
  </section>
  <section style="max-width:820px;margin:0 auto;padding:72px 24px">
    <div style="background:#fff;border:1px solid var(--border-default);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:40px;display:flex;flex-direction:column;gap:24px">
      <h2 style="margin:0;font-family:var(--font-display);font-weight:800;font-size:26px;color:var(--text-strong)">Volunteer application</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
        <div style="display:flex;flex-direction:column;gap:6px"><label style="font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--text-strong)">Full Name</label><input placeholder="Your full name" style="padding:12px 15px;border-radius:var(--radius-md);border:1.5px solid var(--border-strong);font-family:var(--font-body);font-size:15px;outline:none" style-focus="border-color:var(--color-primary)"></div>
        <div style="display:flex;flex-direction:column;gap:6px"><label style="font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--text-strong)">Email</label><input placeholder="you@email.com" style="padding:12px 15px;border-radius:var(--radius-md);border:1.5px solid var(--border-strong);font-family:var(--font-body);font-size:15px;outline:none" style-focus="border-color:var(--color-primary)"></div>
        <div style="display:flex;flex-direction:column;gap:6px"><label style="font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--text-strong)">Phone Number</label><input placeholder="+234 ..." style="padding:12px 15px;border-radius:var(--radius-md);border:1.5px solid var(--border-strong);font-family:var(--font-body);font-size:15px;outline:none" style-focus="border-color:var(--color-primary)"></div>
        <div style="display:flex;flex-direction:column;gap:6px"><label style="font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--text-strong)">Location</label><input placeholder="City, State" style="padding:12px 15px;border-radius:var(--radius-md);border:1.5px solid var(--border-strong);font-family:var(--font-body);font-size:15px;outline:none" style-focus="border-color:var(--color-primary)"></div>
        <div style="display:flex;flex-direction:column;gap:6px"><label style="font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--text-strong)">Gender</label><select style="padding:12px 15px;border-radius:var(--radius-md);border:1.5px solid var(--border-strong);font-family:var(--font-body);font-size:15px;outline:none;background:#fff"><option>Select</option><option>Male</option><option>Female</option></select></div>
        <div style="display:flex;flex-direction:column;gap:6px"><label style="font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--text-strong)">Employment Status</label><select style="padding:12px 15px;border-radius:var(--radius-md);border:1.5px solid var(--border-strong);font-family:var(--font-body);font-size:15px;outline:none;background:#fff"><option>Select</option><option>Employed</option><option>Unemployed</option><option>Self-employed</option><option>Other</option></select></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <label style="font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--text-strong)">Skills / Interests <span style="color:var(--text-muted);font-weight:500">(select all that apply)</span></label>
        <div style="display:flex;flex-wrap:wrap;gap:9px">
          <sc-for list="{{ skills }}" as="s" hint-placeholder-count="18"><button onClick="{{ s.toggle }}" style="{{ s.style }}">{{ s.label }}</button></sc-for>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px"><label style="font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--text-strong)">Working experience with these skills</label><textarea rows="3" placeholder="Tell us briefly about your experience" style="padding:12px 15px;border-radius:var(--radius-md);border:1.5px solid var(--border-strong);font-family:var(--font-body);font-size:15px;outline:none;resize:vertical" style-focus="border-color:var(--color-primary)"></textarea></div>
      <div style="display:flex;flex-direction:column;gap:6px"><label style="font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--text-strong)">How did you hear about us?</label><select style="padding:12px 15px;border-radius:var(--radius-md);border:1.5px solid var(--border-strong);font-family:var(--font-body);font-size:15px;outline:none;background:#fff"><option>Select</option><option>Our website</option><option>Facebook</option><option>Twitter / X</option><option>LinkedIn</option><option>Instagram</option><option>From a friend</option><option>Other</option></select></div>
      <button onClick="{{ onSubmit }}" style="align-self:flex-start;display:inline-flex;align-items:center;padding:15px 34px;border:none;border-radius:var(--radius-pill);background:var(--color-primary);color:#fff;font-family:var(--font-heading);font-weight:700;font-size:16px;cursor:pointer;box-shadow:var(--shadow-teal)" style-hover="background:var(--color-primary-hover)">Sign Me Up</button>
    </div>
  </section>
  <dc-import name="SiteFooter" hint-size="100%,360px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:800}}">
class Component extends DCLogic {
  state = { picked: {} };
  renderVals() {
    const list = ['Photography', 'Videography', 'Content Writing', 'Graphic Design', 'Grant Proposal Writing', 'Proof Reading', 'Digital Engagement', 'Fundraising', 'Marketing', 'Coaching & Training', 'Brand Management & PR', 'Social Media Management', 'Legal Expertise', 'Girls/Women Empowerment', 'Finance & Accounting', 'Project Management', 'STEM', 'Other'];
    const skills = list.map((label) => {
      const on = !!this.state.picked[label];
      return {
        label,
        toggle: () => this.setState((s) => ({ picked: { ...s.picked, [label]: !s.picked[label] } })),
        style: {
          padding: '9px 15px', borderRadius: 'var(--radius-pill)', cursor: 'pointer',
          fontFamily: 'var(--font-heading)', fontWeight: 600, fontSize: 13.5,
          border: on ? '1.5px solid var(--color-primary)' : '1.5px solid var(--border-strong)',
          background: on ? 'var(--rsa-teal-100)' : '#fff',
          color: on ? 'var(--rsa-teal-700)' : 'var(--text-body)',
          transition: 'all 140ms cubic-bezier(.2,.7,.3,1)',
        },
      };
    });
    const onSubmit = () => alert('Thank you for volunteering! This is a demo form.');
    return { skills, onSubmit };
  }
}
</script>
</body>
</html>
